<!DOCTYPE html>
<html lang="zh-HK" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minimal Job Board</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkbg: '#0f1115',
                        panelbg: '#1a1d24',
                        cardbg: '#252932',
                        accent: '#3b82f6'
                    }
                }
            }
        }
    </script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .sortable-ghost {
            opacity: 0.2;
            transform: scale(0.95);
        }
        
        .job-card {
            touch-action: pan-y;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .job-card:active {
            cursor: grabbing;
        }

        /* Glassmorphism for modals */
        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        .dark .glass {
            background: rgba(37, 41, 50, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }

        /* Accent colors for cards */
        .accent-blue { border-left: 4px solid #3b82f6; }
        .accent-purple { border-left: 4px solid #a855f7; }
        .accent-emerald { border-left: 4px solid #10b981; }
        .accent-pink { border-left: 4px solid #ec4899; }
        .accent-amber { border-left: 4px solid #f59e0b; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden bg-gray-50 dark:bg-darkbg text-gray-900 dark:text-gray-100">

    <!-- Header -->
    <header class="border-b border-gray-200 dark:border-gray-800 bg-white/80 dark:bg-panelbg/80 backdrop-blur-md px-6 py-4 flex justify-between items-center shrink-0 z-10 transition-colors">
        <h1 class="text-xl font-bold tracking-tight flex items-center gap-2">
            <i class="ph-fill ph-kanban text-accent text-2xl"></i>
            WORKSPACE
        </h1>
        <div class="flex items-center gap-2 sm:gap-3">
            <!-- Theme Toggle -->
            <button onclick="toggleTheme()" class="p-2 rounded-md bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 text-gray-600 dark:text-gray-400 transition-colors">
                <i id="themeIcon" class="ph-bold ph-moon text-lg"></i>
            </button>
            <!-- Share Link -->
            <button onclick="openSyncModal()" class="flex items-center gap-2 px-3 py-2 rounded-md bg-gray-200 dark:bg-gray-800 hover:bg-gray-300 dark:hover:bg-gray-700 text-sm font-medium transition-colors border border-gray-300 dark:border-gray-700">
                <i class="ph ph-link text-gray-500 dark:text-gray-400 text-lg"></i>
                <span class="hidden sm:inline text-gray-600 dark:text-gray-300">Share Link</span>
            </button>
        </div>
    </header>

    <!-- Main Board -->
    <main class="flex-1 overflow-hidden relative">
        <div id="loadingOverlay" class="absolute inset-0 bg-white/80 dark:bg-darkbg/80 backdrop-blur-sm z-20 flex flex-col items-center justify-center hidden">
            <i class="ph ph-spinner-gap animate-spin text-4xl text-accent mb-4"></i>
            <p class="text-gray-500 dark:text-gray-400 font-medium">Syncing data...</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 sm:grid-rows-2 gap-4 sm:gap-6 p-4 sm:p-6 h-full overflow-y-auto sm:overflow-hidden">
            
            <!-- Column Template -->
            <div class="flex flex-col bg-gray-100 dark:bg-panelbg rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm dark:shadow-xl min-h-[350px] sm:min-h-0 transition-colors">
                <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gradient-to-r from-red-500/5 to-transparent">
                    <h2 class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-2 text-sm uppercase tracking-wider">
                        <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]"></div>
                        Urgent
                    </h2>
                    <div class="flex items-center gap-3">
                        <span id="count-urgent" class="text-gray-400 dark:text-gray-500 text-xs font-mono bg-white dark:bg-darkbg px-2 py-0.5 rounded shadow-inner">0</span>
                        <button onclick="openAddModal('urgent')" class="w-7 h-7 flex items-center justify-center bg-white dark:bg-gray-800 hover:bg-red-500/20 hover:text-red-500 dark:hover:text-red-400 rounded-full transition-all active:scale-90 text-gray-400 dark:text-gray-400 border border-gray-200 dark:border-gray-700 shadow-sm">
                            <i class="ph-bold ph-plus text-sm"></i>
                        </button>
                    </div>
                </div>
                <div id="urgent" class="flex-1 p-4 overflow-y-auto grid grid-cols-2 gap-4 content-start no-scrollbar"></div>
            </div>

            <!-- Column: On-going -->
            <div class="flex flex-col bg-gray-100 dark:bg-panelbg rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm dark:shadow-xl min-h-[350px] sm:min-h-0 transition-colors">
                <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gradient-to-r from-blue-500/5 to-transparent">
                    <h2 class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-2 text-sm uppercase tracking-wider">
                        <div class="w-2 h-2 rounded-full bg-blue-500 shadow-[0_0_8px_rgba(59,130,246,0.6)]"></div>
                        On-going
                    </h2>
                    <div class="flex items-center gap-3">
                        <span id="count-ongoing" class="text-gray-400 dark:text-gray-500 text-xs font-mono bg-white dark:bg-darkbg px-2 py-0.5 rounded shadow-inner">0</span>
                        <button onclick="openAddModal('ongoing')" class="w-7 h-7 flex items-center justify-center bg-white dark:bg-gray-800 hover:bg-blue-500/20 hover:text-blue-500 dark:hover:text-blue-400 rounded-full transition-all active:scale-90 text-gray-400 dark:text-gray-400 border border-gray-200 dark:border-gray-700 shadow-sm">
                            <i class="ph-bold ph-plus text-sm"></i>
                        </button>
                    </div>
                </div>
                <div id="ongoing" class="flex-1 p-4 overflow-y-auto grid grid-cols-2 gap-4 content-start no-scrollbar"></div>
            </div>

            <!-- Column: Feedback -->
            <div class="flex flex-col bg-gray-100 dark:bg-panelbg rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm dark:shadow-xl min-h-[350px] sm:min-h-0 transition-colors">
                <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gradient-to-r from-amber-500/5 to-transparent">
                    <h2 class="font-semibold text-gray-700 dark:text-gray-200 flex items-center gap-2 text-sm uppercase tracking-wider">
                        <div class="w-2 h-2 rounded-full bg-amber-500 shadow-[0_0_8px_rgba(245,158,11,0.6)]"></div>
                        Feedback
                    </h2>
                    <div class="flex items-center gap-3">
                        <span id="count-feedback" class="text-gray-400 dark:text-gray-500 text-xs font-mono bg-white dark:bg-darkbg px-2 py-0.5 rounded shadow-inner">0</span>
                        <button onclick="openAddModal('feedback')" class="w-7 h-7 flex items-center justify-center bg-white dark:bg-gray-800 hover:bg-amber-500/20 hover:text-amber-500 dark:hover:text-amber-400 rounded-full transition-all active:scale-90 text-gray-400 dark:text-gray-400 border border-gray-200 dark:border-gray-700 shadow-sm">
                            <i class="ph-bold ph-plus text-sm"></i>
                        </button>
                    </div>
                </div>
                <div id="feedback" class="flex-1 p-4 overflow-y-auto grid grid-cols-2 gap-4 content-start no-scrollbar"></div>
            </div>

            <!-- Column: Finished -->
            <div class="flex flex-col bg-gray-100 dark:bg-panelbg rounded-xl border border-gray-200 dark:border-gray-800 overflow-hidden shadow-sm dark:shadow-xl opacity-75 hover:opacity-100 transition-all min-h-[350px] sm:min-h-0">
                <div class="p-4 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center bg-gradient-to-r from-gray-500/5 to-transparent">
                    <h2 class="font-semibold text-gray-600 dark:text-gray-400 flex items-center gap-2 text-sm uppercase tracking-wider">
                        <div class="w-2 h-2 rounded-full bg-gray-400 dark:bg-gray-500 shadow-[0_0_8px_rgba(107,114,128,0.5)]"></div>
                        FINISHED
                    </h2>
                    <div class="flex items-center gap-3">
                        <span id="count-finished" class="text-gray-400 dark:text-gray-500 text-xs font-mono bg-white dark:bg-darkbg px-2 py-0.5 rounded shadow-inner">0</span>
                        <button onclick="openAddModal('finished')" class="w-7 h-7 flex items-center justify-center bg-white dark:bg-gray-800 hover:bg-gray-100 dark:hover:bg-gray-500/20 hover:text-gray-700 dark:hover:text-gray-300 rounded-full transition-all active:scale-90 text-gray-400 dark:text-gray-400 border border-gray-200 dark:border-gray-700 shadow-sm">
                            <i class="ph-bold ph-plus text-sm"></i>
                        </button>
                    </div>
                </div>
                <div id="finished" class="flex-1 p-4 overflow-y-auto grid grid-cols-2 gap-4 content-start no-scrollbar"></div>
            </div>

        </div>
    </main>

    <!-- Modals -->
    <div id="jobModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="glass rounded-xl w-full max-w-md overflow-hidden transform transition-all shadow-2xl">
            <div class="px-6 py-5 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50">
                <h3 id="modalTitle" class="text-lg font-semibold text-gray-800 dark:text-gray-100 tracking-wide">New Task</h3>
                <button onclick="closeJobModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6">
                <form id="jobForm" onsubmit="handleJobSubmit(event)">
                    <textarea id="jobText" rows="2" class="w-full bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-gray-800 dark:text-gray-200 focus:ring-1 focus:ring-accent focus:border-accent outline-none resize-none placeholder-gray-400 dark:placeholder-gray-600 transition-all" placeholder="What's the task? (Press Enter to save)" required></textarea>
                    <div class="flex justify-end gap-3 mt-5">
                        <button type="button" onclick="closeJobModal()" class="px-4 py-2 text-sm text-gray-500 dark:text-gray-300 hover:bg-gray-200 dark:hover:bg-gray-700/50 rounded-md font-medium transition-colors">Cancel</button>
                        <button type="submit" id="submitBtn" class="px-5 py-2 text-sm text-white bg-accent hover:bg-blue-500 rounded-md font-medium shadow-lg shadow-blue-500/20 transition-all">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Custom Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="glass rounded-xl w-full max-w-sm overflow-hidden transform transition-all shadow-2xl border border-red-500/20">
            <div class="p-6 text-center">
                <div class="w-14 h-14 rounded-full bg-red-500/10 flex items-center justify-center mx-auto mb-4">
                    <i class="ph-fill ph-warning-circle text-3xl text-red-500"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-2">Delete this task?</h3>
                <p class="text-sm text-gray-500 dark:text-gray-400 mb-6">This action cannot be undone.</p>
                <div class="flex gap-3 w-full">
                    <button onclick="closeDeleteModal()" class="flex-1 py-2.5 text-sm text-gray-500 dark:text-gray-300 bg-gray-100 dark:bg-gray-800 hover:bg-gray-200 dark:hover:bg-gray-700 rounded-md font-medium transition-colors">Cancel</button>
                    <button onclick="confirmDelete()" class="flex-1 py-2.5 text-sm text-white bg-red-500 hover:bg-red-600 rounded-md font-medium shadow-lg shadow-red-500/20 transition-all">Delete</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Sync Modal -->
    <div id="syncModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center p-4 z-50 backdrop-blur-sm transition-opacity">
        <div class="glass rounded-xl w-full max-w-md overflow-hidden transform transition-all shadow-2xl border border-gray-200 dark:border-gray-700">
            <div class="px-6 py-5 flex justify-between items-center border-b border-gray-200/50 dark:border-gray-700/50">
                <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 flex items-center gap-2">
                    <i class="ph-fill ph-link text-accent"></i> Share Board
                </h3>
                <button onclick="closeSyncModal()" class="text-gray-400 hover:text-gray-600 dark:hover:text-white transition-colors">
                    <i class="ph-bold ph-x text-xl"></i>
                </button>
            </div>
            <div class="p-6 space-y-4">
                <p class="text-sm text-gray-500 dark:text-gray-300">Copy this link and send it to your phone or other computers. Everything syncs in real-time!</p>
                <div>
                    <div class="flex items-center gap-2 mt-2">
                        <input type="text" id="modalLinkDisplay" readonly class="flex-1 bg-gray-50 dark:bg-darkbg border border-gray-200 dark:border-gray-700 rounded-lg p-3 text-sm text-gray-500 dark:text-gray-400 outline-none truncate" value="https://...">
                        <button onclick="copySyncLink()" class="p-3 bg-accent hover:bg-blue-500 rounded-lg text-white shadow-lg shadow-blue-500/20 transition-all flex items-center gap-2" title="Copy Link">
                            <i class="ph ph-copy text-xl"></i>
                            <span class="font-medium">Copy</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>


    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        // --- Theme Init ---
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            
            if (savedTheme === 'dark') {
                html.classList.add('dark');
                icon.className = 'ph-bold ph-sun text-lg';
            } else {
                html.classList.remove('dark');
                icon.className = 'ph-bold ph-moon text-lg';
            }
        }
        
        window.toggleTheme = function() {
            const html = document.documentElement;
            const icon = document.getElementById('themeIcon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                icon.className = 'ph-bold ph-moon text-lg';
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.add('dark');
                icon.className = 'ph-bold ph-sun text-lg';
                localStorage.setItem('theme', 'dark');
            }
        }
        
        initTheme();

        // --- Config ---
        const columns = ['urgent', 'ongoing', 'feedback', 'finished'];
        let jobs = { urgent: [], ongoing: [], feedback: [], finished: [] };
        const accentColors = ['accent-blue', 'accent-purple', 'accent-emerald', 'accent-pink', 'accent-amber'];
        
        const urlParams = new URLSearchParams(window.location.search);
        const boardFromUrl = urlParams.get('board');
        let currentBoardId = boardFromUrl || localStorage.getItem('minimalBoardSyncCode');
        let unsubscribeSnapshot = null;
        
        let currentEditingJob = null; 
        let targetColumnForAdd = 'urgent';
        let jobToDelete = null; 
        
        const loadingOverlay = document.getElementById('loadingOverlay');
        const modalLinkDisplay = document.getElementById('modalLinkDisplay');

        const myFirebaseConfig = {
            apiKey: "AIzaSyAgWHPnYu9I3mo72vIV3FNBMBdgD62ZtHo",
            authDomain: "job-list-78f35.firebaseapp.com",
            projectId: "job-list-78f35",
            storageBucket: "job-list-78f35.firebasestorage.app",
            messagingSenderId: "145504118618",
            appId: "1:145504118618:web:86b45fa741f0d4cd20b563"
        };

        let useFirebase = false;
        let db = null;
        let auth = null;
        let appId = 'my-personal-kanban'; 

        try {
            if (typeof __firebase_config !== 'undefined') {
                const envConfig = JSON.parse(__firebase_config);
                const app = initializeApp(envConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
                useFirebase = true;
            } 
            else if (myFirebaseConfig.apiKey) {
                const app = initializeApp(myFirebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                useFirebase = true;
            }
        } catch (e) { console.log("Init error:", e); }

        function generateCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }

        async function initAuth() {
            if (!useFirebase) { loadingOverlay.classList.add('hidden'); initBoard(); return; }
            loadingOverlay.classList.remove('hidden');
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) { useFirebase = false; initBoard(); }
        }

        function initBoard() {
            if (!currentBoardId) {
                currentBoardId = generateCode();
                localStorage.setItem('minimalBoardSyncCode', currentBoardId);
                jobs = { urgent: [], ongoing: [], feedback: [], finished: [] };
                saveData();
            } else if (boardFromUrl) {
                localStorage.setItem('minimalBoardSyncCode', currentBoardId);
            }
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?board=' + currentBoardId;
            try { window.history.replaceState({path: newUrl}, '', newUrl); } catch (e) {}
            updateLinkDisplay(newUrl);
            listenToData();
        }

        initAuth();
        if (useFirebase) {
            onAuthStateChanged(auth, (user) => { if (user) initBoard(); });
        }

        function updateLinkDisplay(url) { if(modalLinkDisplay) modalLinkDisplay.value = url; }

        function listenToData() {
            if (useFirebase && auth && auth.currentUser) {
                if (unsubscribeSnapshot) unsubscribeSnapshot();
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kanban_boards', currentBoardId);
                unsubscribeSnapshot = onSnapshot(docRef, (docSnap) => {
                    loadingOverlay.classList.add('hidden');
                    if (docSnap.exists()) {
                        jobs = docSnap.data();
                        columns.forEach(col => { if(!jobs[col]) jobs[col] = []; });
                    } else {
                        jobs = { urgent: [], ongoing: [], feedback: [], finished: [] };
                    }
                    renderBoard();
                }, (error) => { console.error(error); });
            } else {
                loadingOverlay.classList.add('hidden');
                const localData = localStorage.getItem('local_board_' + currentBoardId);
                if (localData) {
                    jobs = JSON.parse(localData);
                    columns.forEach(col => { if(!jobs[col]) jobs[col] = []; });
                }
                renderBoard();
            }
        }

        async function saveData() {
            if (useFirebase && auth && auth.currentUser) {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'kanban_boards', currentBoardId);
                try { await setDoc(docRef, jobs); } catch (err) { console.error(err); }
            } else {
                localStorage.setItem('local_board_' + currentBoardId, JSON.stringify(jobs));
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
        }

        function getColorById(id) {
            const num = parseInt(id.replace(/\D/g, '')) || 0;
            return accentColors[num % accentColors.length];
        }

        window.renderBoard = function() {
            columns.forEach(colId => {
                const container = document.getElementById(colId);
                container.innerHTML = ''; 
                document.getElementById(`count-${colId}`).innerText = jobs[colId].length;

                jobs[colId].forEach((job, index) => {
                    const el = document.createElement('div');
                    const colorClass = getColorById(job.id);
                    // Updated Light Mode: White card on Gray-100 column with shadow
                    // Updated Dark Mode: Accentuated border and shadow
                    el.className = `job-card bg-white dark:bg-cardbg p-4 rounded-lg border border-gray-200 dark:border-gray-700/80 cursor-grab hover:border-accent hover:scale-[1.02] dark:hover:border-gray-500/50 flex items-center justify-center group relative min-h-[95px] text-center shadow-md dark:shadow-2xl transition-all ${colorClass}`;
                    el.dataset.id = job.id;
                    
                    const displayTxt = escapeHtml(job.text).replace(/\n/g, '<br>');
                    const taskNumber = index + 1;

                    el.innerHTML = `
                        <div class="text-sm sm:text-base text-gray-700 dark:text-gray-100 break-words w-full pointer-events-none font-bold tracking-wide">
                            <span class="text-accent/80 mr-1">${taskNumber}.</span> ${displayTxt}
                        </div>
                        <div class="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="requestEdit('${colId}', '${job.id}')" class="text-gray-400 hover:text-accent p-1.5 bg-white/95 dark:bg-darkbg/90 border border-gray-200 dark:border-gray-700 rounded-md backdrop-blur-sm transition-colors shadow-sm">
                                <i class="ph-bold ph-pencil-simple text-sm"></i>
                            </button>
                            <button onclick="requestDelete('${colId}', '${job.id}')" class="text-gray-400 hover:text-red-400 p-1.5 bg-white/95 dark:bg-darkbg/90 border border-gray-200 dark:border-gray-700 rounded-md backdrop-blur-sm transition-colors shadow-sm">
                                <i class="ph-bold ph-trash text-sm"></i>
                            </button>
                        </div>
                    `;
                    container.appendChild(el);
                });
            });
            initSortable();
        }

        let sortables = [];
        function initSortable() {
            sortables.forEach(s => s.destroy());
            sortables = [];
            columns.forEach(colId => {
                const s = new Sortable(document.getElementById(colId), {
                    group: 'shared',
                    animation: 250,
                    easing: "cubic-bezier(0.4, 0, 0.2, 1)",
                    ghostClass: 'sortable-ghost',
                    delay: 100, 
                    delayOnTouchOnly: true,
                    onEnd: function (evt) {
                        const fromCol = evt.from.id;
                        const toCol = evt.to.id;
                        const oldIndex = evt.oldIndex;
                        const newIndex = evt.newIndex;
                        if (fromCol === toCol && oldIndex === newIndex) return;
                        const movedItem = jobs[fromCol].splice(oldIndex, 1)[0];
                        jobs[toCol].splice(newIndex, 0, movedItem);
                        saveData();
                    }
                });
                sortables.push(s);
            });
        }

        const jobModal = document.getElementById('jobModal');
        const jobInput = document.getElementById('jobText');
        const modalTitle = document.getElementById('modalTitle');

        jobInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                handleJobSubmit(e);
            }
        });

        window.openAddModal = (colId) => {
            currentEditingJob = null;
            targetColumnForAdd = colId;
            modalTitle.innerText = `Add to ${colId.charAt(0).toUpperCase() + colId.slice(1)}`;
            jobInput.value = '';
            jobModal.classList.remove('hidden');
            setTimeout(() => jobInput.focus(), 100);
        }

        window.requestEdit = (colId, jobId) => {
            const job = jobs[colId].find(j => j.id === jobId);
            if (!job) return;
            currentEditingJob = { colId, jobId };
            modalTitle.innerText = "Edit Task";
            jobInput.value = job.text;
            jobModal.classList.remove('hidden');
            setTimeout(() => jobInput.focus(), 100);
        }

        window.closeJobModal = () => {
            jobModal.classList.add('hidden');
            currentEditingJob = null;
        }

        window.handleJobSubmit = (e) => {
            if (e) e.preventDefault();
            const text = jobInput.value.trim();
            if (!text) return;

            if (currentEditingJob) {
                const job = jobs[currentEditingJob.colId].find(j => j.id === currentEditingJob.jobId);
                if (job) job.text = text;
            } else {
                jobs[targetColumnForAdd].unshift({
                    id: 'job_' + Date.now() + Math.floor(Math.random()*1000),
                    text: text
                });
            }
            
            saveData();
            closeJobModal();
        }

        const deleteModal = document.getElementById('deleteModal');
        window.requestDelete = (colId, jobId) => {
            jobToDelete = { colId, jobId };
            deleteModal.classList.remove('hidden');
        }
        window.closeDeleteModal = () => {
            deleteModal.classList.add('hidden');
            jobToDelete = null;
        }
        window.confirmDelete = () => {
            if (jobToDelete) {
                jobs[jobToDelete.colId] = jobs[jobToDelete.colId].filter(j => j.id !== jobToDelete.jobId);
                saveData();
                closeDeleteModal();
            }
        }

        const syncModal = document.getElementById('syncModal');
        window.openSyncModal = () => syncModal.classList.remove('hidden');
        window.closeSyncModal = () => syncModal.classList.add('hidden');
        window.copySyncLink = () => {
            const linkToCopy = modalLinkDisplay.value;
            navigator.clipboard.writeText(linkToCopy).then(() => {
                const btnIcon = document.querySelector('button[title="Copy Link"] i');
                const btnText = document.querySelector('button[title="Copy Link"] span');
                btnIcon.className = 'ph-fill ph-check text-xl';
                btnText.innerText = 'Copied!';
                setTimeout(() => {
                    btnIcon.className = 'ph ph-copy text-xl';
                    btnText.innerText = 'Copy';
                }, 2000);
            });
        }

        [jobModal, deleteModal, syncModal].forEach(modal => {
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.add('hidden');
            });
        });
    </script>
</body>
</html>
